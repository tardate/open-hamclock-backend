# OHB voacap-service proxy config for lighttpd
# Place at: /etc/lighttpd/conf-enabled/53-voacap-proxy.conf
# Requires mod_proxy to be loaded:
#   sudo lighttpd-enable-mod proxy
#   sudo service lighttpd restart

server.modules += ( "mod_proxy" )

$HTTP["url"] == "/ham/HamClock/fetchVOACAPArea.pl" {
    proxy.server = ( "" => (( "host" => "172.21.0.3", "port" => 8080 )) )
    proxy.forwarded = ( "for" => 1 )
    setenv.add-response-header = ()
}

$HTTP["url"] == "/ham/HamClock/fetchVOACAP-TOA.pl" {
    proxy.server = ( "" => (( "host" => "172.21.0.3", "port" => 8080 )) )
    proxy.forwarded = ( "for" => 1 )
    setenv.add-response-header = ()
}

$HTTP["url"] == "/ham/HamClock/fetchVOACAP-MUF.pl" {
    proxy.server = ( "" => (( "host" => "172.21.0.3", "port" => 8080 )) )
    proxy.forwarded = ( "for" => 1 )
    setenv.add-response-header = ()
}
