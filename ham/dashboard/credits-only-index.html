<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Open HamClock Backend</title>
<style>
/* 1. Changed height from 100% to min-height so the page can grow */
html, body {
    margin: 0;
    min-height: 100%; 
    background: #05070c;
    color: #e6e6e6;
    font-family: system-ui, monospace;
}

.wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.title {
    letter-spacing: 3px;
    font-size: 20px;
    margin-bottom: 8px;
    color: #d8e7ff;
}

.panel {
    margin-top: 10px;
    border: 1px solid #2b4a7a;
    background: rgba(5, 10, 25, .85);
    padding: 16px 22px;
    box-shadow: 0 0 25px rgba(100, 160, 255, .15);
    /* Ensure the panel expands with the iframe */
    width: 760px; 
}

/* 2. Set a specific pixel height for the iframe */
iframe {
    border: none;
    width: 100%;
    height: 1575px; /* Adjust this value until the scrollbar disappears */
    filter: brightness(1.2);
    display: block;
}
</style>
</head>
<body>

<div class="wrap">
    <div class="title">OPEN HAMCLOCK BACKEND</div>
    <div class="panel">
        <iframe src="/credits.html"></iframe>
    </div>
</div>

</body>
</html>
